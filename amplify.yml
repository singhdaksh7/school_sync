version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx prisma generate
        - echo "DATABASE_URL=$DATABASE_URL" > .env.production
        - echo "AUTH_SECRET=$AUTH_SECRET" >> .env.production
        - echo "AUTH_URL=$AUTH_URL" >> .env.production
        - echo "NEXTAUTH_SECRET=$AUTH_SECRET" >> .env.production
        - echo "NEXTAUTH_URL=$AUTH_URL" >> .env.production
        - echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
